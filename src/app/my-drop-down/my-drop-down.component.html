

<div *ngIf="isFilterNeeded===true || isSortNeeded===true" class="dropdown">
    <div class="Straight-content">
        <div  class=" StraightDropDown" style="margin-top:0px; margin-left:10px;" >
            <span  >
                <ul class="Buffer">&nbsp; </ul>
                <ul *ngIf="isSortNeeded===true">
                    <li *ngFor="let list of ListSortFields; let i=index;" 
                        class='Straight-options' [ngClass]=" {'colorEven': i % 2 ===0, 'colorOdd': i % 2 !==0}" 
                        (click)="theCollection($event)" id="S-{{i}}" [value]="list">{{list}}</li>
                </ul >
                <ul  *ngIf="isFilterNeeded===true" stlyle="floatleft">
                    <li *ngFor="let list of ListFilter; let i=index;" 
                        class="Straight-options" [ngClass]=" {'colorEven': i % 2 ===0, 'colorOdd': i % 2 !==0}" 
                        (click)="theCollection($event)" id="F-{{i}}" [value]="i">{{list}}</li>
                </ul  >
            </span>  
            <button class="sizeButtons" style="margin-left:100px;" (click)="Cancel($event)">Cancel</button>
            <div class="Buffer" class="margin-top:15px;">&nbsp; </div>
        </div>
    </div>
</div>
<div *ngIf="callingComponent==='FitnessStat'" class="dropdown">
    <div class="Straight-content">
        <div  class=" StraightDropDown" style="margin-top:0px; margin-left:10px;" >
            <ul class="Buffer">&nbsp; </ul>
            <ul *ngIf="OpenDialogue[0]===true">
                <li *ngFor="let sport of MyConfigFitness.TabSport; let i=index;"  
                    class='Straight-options'   [ngClass]=" {'colorEven': i % 2 ===0, 'colorOdd': i % 2 !==0}" 
                    (click)="theCollection($event)" id="lSpo-{{TabOfId[0]}}" [value]="sport.name" >{{sport.name}}</li>
            </ul>

            <ul *ngIf="OpenDialogue[1]===true && TabPerfConfig[TabOfId[0]]!== undefined"> 
                <li *ngFor="let activ of MyConfigFitness.ListSport[TabPerfConfig[TabOfId[0]]].activityName; let i=index;" 
                    class="Straight-options"  [ngClass]=" {'colorEven': i % 2 ===0, 'colorOdd': i % 2 !==0}" 
                    (click)="theCollection($event)" id="lAct-{{TabOfId[0]}}-{{TabOfId[1]}}" [value]="activ" >{{activ}}</li>
            </ul>
            <ul *ngIf="OpenDialogue[1]===true && TabPerfConfig[TabOfId[0]]=== undefined">
                <li *ngFor="let activ of MyConfigFitness.TabActivity; let i=index;" 
                    class='Straight-options'   [ngClass]=" {'colorEven': i % 2 ===0, 'colorOdd': i % 2 !==0}" 
                    (click)="theCollection($event)" id="lAct-{{TabOfId[0]}}-{{TabOfId[1]}}" [value]="activ.name" >{{activ.name}}</li>     
            </ul>  

            <ul *ngIf="OpenDialogue[5]===true && TabPerfConfig[TabOfId[0]]!== undefined"> 
                <li *ngFor="let actExe of MyConfigFitness.ListSport[TabPerfConfig[TabOfId[0]]].activityExercise; let i=index;" 
                    class="Straight-options"  [ngClass]=" {'colorEven': i % 2 ===0, 'colorOdd': i % 2 !==0}" 
                    (click)="theCollection($event)" id="lExeName-{{TabOfId[0]}}-{{TabOfId[1]}}-{{TabOfId[2]}}" [value]="actExe" >{{actExe}}</li>
            </ul>
            <ul *ngIf="OpenDialogue[5]===true && TabPerfConfig[TabOfId[0]]=== undefined">
                <li *ngFor="let actExe of MyConfigFitness.TabExercise; let i=index;" 
                    class='Straight-options'   [ngClass]=" {'colorEven': i % 2 ===0, 'colorOdd': i % 2 !==0}" 
                    (click)="theCollection($event)" id="lExeName-{{TabOfId[0]}}-{{TabOfId[1]}}-{{TabOfId[2]}}" [value]="actExe.name" >{{actExe.name}}</li>     
            </ul>   


            <ul *ngIf="OpenDialogue[2]===true && TabPerfConfig[TabOfId[0]]!== undefined"> 
                <li *ngFor="let units of MyConfigFitness.ListSport[TabPerfConfig[TabOfId[0]]].activityUnit; let i=index;" 
                    class="Straight-options"  [ngClass]=" {'colorEven': i % 2 ===0, 'colorOdd': i % 2 !==0}" 
                    (click)="theCollection($event)" id="lExeUnit-{{TabOfId[0]}}-{{TabOfId[1]}}-{{TabOfId[2]}}" [value]="units" >{{units}}</li>
            </ul>
            <ul *ngIf="OpenDialogue[2]===true && TabPerfConfig[TabOfId[0]]=== undefined">
                <li *ngFor="let units of MyConfigFitness.TabUnits; let i=index;" 
                    class='Straight-options'   [ngClass]=" {'colorEven': i % 2 ===0, 'colorOdd': i % 2 !==0}" 
                    (click)="theCollection($event)" id="lExeUnit-{{TabOfId[0]}}-{{TabOfId[1]}}-{{TabOfId[2]}}" [value]="units.name" >{{units.name}}</li>        
            </ul>   


            <ul *ngIf="OpenDialogue[3]===true && TabPerfConfig[TabOfId[0]]!== undefined"> 
                <li *ngFor="let perfType of MyConfigFitness.ListSport[TabPerfConfig[TabOfId[0]]].activityPerfType; let i=index;" 
                    class="Straight-options"  [ngClass]=" {'colorEven': i % 2 ===0, 'colorOdd': i % 2 !==0}" 
                    (click)="theCollection($event)" id="ltPerf-{{TabOfId[0]}}-{{TabOfId[1]}}-{{TabOfId[2]}}-{{TabOfId[3]}}-{{TabOfId[4]}}" [value]="perfType" >{{perfType}}</li>
            </ul> 
            <ul *ngIf="OpenDialogue[3]===true && TabPerfConfig[TabOfId[0]]=== undefined">
                <li *ngFor="let perfType of MyConfigFitness.TabPerfType; let i=index;" 
                    class='Straight-options'   [ngClass]=" {'colorEven': i % 2 ===0, 'colorOdd': i % 2 !==0}" 
                    (click)="theCollection($event)" id="ltPerf-{{TabOfId[0]}}-{{TabOfId[1]}}-{{TabOfId[2]}}-{{TabOfId[3]}}-{{TabOfId[4]}}" [value]="perfType.name" >{{perfType.name}}</li>
            </ul>   

            <ul *ngIf="OpenDialogue[4]===true && TabPerfConfig[TabOfId[0]]!== undefined"> 
                <li *ngFor="let perfUnit of MyConfigFitness.ListSport[TabPerfConfig[TabOfId[0]]].activityPerfUnit; let i=index;" 
                    class="Straight-options"  [ngClass]=" {'colorEven': i % 2 ===0, 'colorOdd': i % 2 !==0}" 
                    (click)="theCollection($event)" id="luPerf-{{TabOfId[0]}}-{{TabOfId[1]}}-{{TabOfId[2]}}-{{TabOfId[3]}}-{{TabOfId[4]}}" [value]="perfUnit" >{{perfUnit}}</li>
            </ul> 
            <ul *ngIf="OpenDialogue[4]===true && TabPerfConfig[TabOfId[0]]=== undefined">
                <li *ngFor="let perfUnit of MyConfigFitness.TabPerfUnit; let i=index;" 
                    class='Straight-options'   [ngClass]=" {'colorEven': i % 2 ===0, 'colorOdd': i % 2 !==0}" 
                    (click)="theCollection($event)" id="luPerf-{{TabOfId[0]}}-{{TabOfId[1]}}-{{TabOfId[2]}}-{{TabOfId[3]}}-{{TabOfId[4]}}" [value]="perfUnit.name" >{{perfUnit.name}}</li>      
            </ul>   


          
            <button class="sizeButtons" style="margin-left:100px;" (click)="Cancel($event)">Cancel</button>
            <div class="Buffer" class="margin-top:15px;">&nbsp; </div>
        </div>
    </div>

</div>
